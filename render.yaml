# Render Blueprint for Prüfen Backend
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: prufen-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /health
